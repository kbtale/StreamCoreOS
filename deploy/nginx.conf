upstream backend  { server backend:8000; }
upstream frontend { server frontend:3000; }

server {
    listen 80;

    # ── SSE endpoints — disable buffering so events stream in real time ──
    location = /chat/stream {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
    location = /dashboard/alerts {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }
    location = /system/events {
        proxy_pass http://backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
    }

    # ── SvelteKit pages — exact matches take priority over prefix rules ──
    location = /auth/callback { proxy_pass http://frontend; }
    location = /chat          { proxy_pass http://frontend; }
    location = /viewers       { proxy_pass http://frontend; }
    location = /commands      { proxy_pass http://frontend; }
    location = /moderation    { proxy_pass http://frontend; }
    location = /timers        { proxy_pass http://frontend; }
    location = /system        { proxy_pass http://frontend; }
    location = /obs           { proxy_pass http://frontend; }
    location = /ai            { proxy_pass http://frontend; }

    # ── Backend API prefix routes ────────────────────────────────────────
    location /auth       { proxy_pass http://backend; }
    location /stream     { proxy_pass http://backend; }
    location /chat/      { proxy_pass http://backend; }
    location /dashboard  { proxy_pass http://backend; }
    location /viewers/   { proxy_pass http://backend; }
    location /moderation/{ proxy_pass http://backend; }
    location /ping       { proxy_pass http://backend; }
    location /timers/    { proxy_pass http://backend; }
    location /ai/        { proxy_pass http://backend; }
    location /system/    { proxy_pass http://backend; }

    # ── Frontend catch-all ───────────────────────────────────────────────
    location / { proxy_pass http://frontend; }
}
